trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

# Assume secrets like connection strings are stored in an Azure DevOps Variable Group
variables:
  - group: AI-Foundry-Secrets

stages:
- stage: Lint_And_Test
  displayName: 'Code Quality & Unit Tests'
  jobs:
  - job: LintTest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
    - script: |
        pip install pytest flake8
        # Add tool testing here: pytest src/tools/
      displayName: 'Install dependencies & Run Lints'

- stage: Deploy_Dev
  displayName: 'Deploy to Development'
  dependsOn: Lint_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployDev
    environment: 'Development'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
          - script: pip install azure-ai-projects pyyaml azure-identity
            displayName: 'Install AI SDK'
          
          # We use the AzureCLI task to automatically handle Service Principal auth 
          # mapped from an Azure DevOps Service Connection.
          - task: AzureCLI@2
            displayName: 'Deploy Agent to Dev'
            inputs:
              azureSubscription: 'Azure-Service-Connection' # Replace with your ADO Service Connection name
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # The connection string is pulled from the ADO Variable Group
                export AZURE_AI_PROJECT_CONN_STR_DEV=$(AZURE_AI_PROJECT_CONN_STR_DEV)
                python scripts/deploy_agent.py --env dev

- stage: Deploy_QA_And_Evaluate
  displayName: 'Deploy to QA & Evaluate'
  dependsOn: Deploy_Dev
  jobs:
  - deployment: DeployQA
    environment: 'QA'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
          - script: pip install azure-ai-projects azure-ai-evaluation pyyaml azure-identity
            displayName: 'Install AI & Eval SDKs'
          
          - task: AzureCLI@2
            displayName: 'Deploy QA Agent & Run Evals'
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                export AZURE_AI_PROJECT_CONN_STR_QA=$(AZURE_AI_PROJECT_CONN_STR_QA)
                python scripts/deploy_agent.py --env qa
                
                echo "Running Batch Evaluations against QA agent..."
                # python evals/run_evals.py --env qa --threshold 0.85

- stage: Deploy_Prod
  displayName: 'Deploy to Production'
  dependsOn: Deploy_QA_And_Evaluate
  jobs:
  - deployment: DeployProd
    environment: 'Production' # Configure 'Approvals and Checks' for this environment in the ADO UI!
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
          - script: pip install azure-ai-projects pyyaml azure-identity
            displayName: 'Install AI SDK'
            
          - task: AzureCLI@2
            displayName: 'Deploy Agent to Prod'
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                export AZURE_AI_PROJECT_CONN_STR_PROD=$(AZURE_AI_PROJECT_CONN_STR_PROD)
                python scripts/deploy_agent.py --env prod
